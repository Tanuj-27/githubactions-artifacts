name: Deploy website
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          keys: deps-node-modules-${{ hashFile('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          keys: deps-node-modules-${{ hashFile('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Job artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-files
          path: dist          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: get build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-files
      - name: output files
        run: ls
      - name: Deploy
        run: echo "Deploying..."
